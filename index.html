<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Federal BRT Easement Impacts</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet" />
  <link href="./styles.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="eyebrow">Federal Blvd BRT Corridor</div>
      <h1>Federal BRT Easement Impacts</h1>
    </div>
    <div class="sidebar-scroll">
      <section class="panel">
        <div class="scheme-switcher" id="scheme-switcher"></div>
        <div class="filter-actions">
          <button id="select-all-btn" class="primary-btn" type="button">Select all</button>
          <button id="clear-all-btn" type="button">Clear all</button>
          <button id="reset-view-btn" type="button">Reset map view</button>
        </div>
        <div class="checkbox-list" id="filter-list"></div>
        <p class="helper-text" id="scheme-helper-text"></p>
      </section>
      <section class="panel">
        <h2>Parcel details</h2>
        <div id="parcel-details" class="detail-placeholder">Hover over a parcel to preview its details. Click a parcel to keep the details visible until you click elsewhere on the map.</div>
      </section>
      <section class="panel">
        <h2>Data status</h2>
        <div id="status-box" class="status-box">Starting parcel queries...</div>
        <ul id="missing-list" class="missing-list"></ul>
      </section>
    </div>
  </aside>
  <main class="map-wrap">
    <div id="map"></div>
    <div id="hover-tooltip" class="hover-tooltip"></div>
  </main>
</div>

<script type="module" src="./src/app.js"></script>
</body>
</html>
